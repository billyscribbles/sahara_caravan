  <!-- Windows -->
  <rect x="110" y="82" width="80" height="32" rx="3" />
  <rect x="210" y="82" width="80" height="32" rx="3" />
  <rect x="310" y="82" width="60" height="32" rx="3" />

  <!-- Door right of centre -->
  <rect x="300" y="108" width="30" height="40" rx="2" />
  <circle cx="323" cy="128" r="1.4" fill="#FFFFFF" stroke="none" />

  <!-- Checker-plate strip -->
  <line x1="70" y1="128" x2="410" y2="128" opacity="0.45" />

  <!-- Tandem wheels -->
  <circle cx="170" cy="158" r="18" />
  <circle cx="170" cy="158" r="7" />
  <circle cx="220" cy="158" r="18" />
  <circle cx="220" cy="158" r="7" />

  <!-- Hitch / drawbar -->
  <path d="M45 148 L25 160 L15 160" />
  <circle cx="14" cy="160" r="3" />

  <!-- Badge -->
  <text x="240" y="175" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600" letter-spacing="0.15em" fill="#FFFFFF" stroke="none" text-anchor="middle">X-MASTER 196 · STANDARD</text>
</svg>
