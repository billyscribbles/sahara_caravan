<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 200" fill="none" stroke="#FFFFFF" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
  <!-- Ground line -->
  <line x1="20" y1="178" x2="460" y2="178" stroke-dasharray="2 6" opacity="0.35" />

  <!-- Body (rectangular profile with stone-guard nose) -->
  <path d="M70 148 L70 70 L380 62 L410 62 L410 148 Z" />

  <!-- Stone-guard nose overlay -->
  <path d="M70 148 L70 110 L45 132 L45 148 Z" />

  <!-- Roof line accent -->
