<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 200" fill="none" stroke="#FFFFFF" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
  <!-- Schematic corner ticks -->
  <g opacity="0.35" stroke-width="1.6">
    <path d="M24 24 L40 24 M24 24 L24 40"/>
    <path d="M456 24 L440 24 M456 24 L456 40"/>
    <path d="M24 176 L40 176 M24 176 L24 160"/>
    <path d="M456 176 L440 176 M456 176 L456 160"/>
  </g>

  <!-- Overhead cabinetry bar above the bed -->
  <rect x="136" y="30" width="208" height="18" rx="3" stroke-width="2.4" opacity="0.55"/>
  <line x1="188" y1="30" x2="188" y2="48" opacity="0.35"/>
  <line x1="240" y1="30" x2="240" y2="48" opacity="0.35"/>
  <line x1="292" y1="30" x2="292" y2="48" opacity="0.35"/>

  <!-- Queen mattress (wide rectangle, rounded corners) -->
  <rect x="128" y="56" width="224" height="118" rx="12" stroke-width="2.8"/>

  <!-- Padded headboard panels -->
  <rect x="140" y="64" width="200" height="30" rx="4" stroke-width="2.4" opacity="0.55"/>
  <line x1="206" y1="64" x2="206" y2="94" opacity="0.35"/>
  <line x1="274" y1="64" x2="274" y2="94" opacity="0.35"/>

  <!-- Twin pillows -->
  <rect x="152" y="102" width="80" height="26" rx="6" stroke-width="2.4" opacity="0.7"/>
  <rect x="248" y="102" width="80" height="26" rx="6" stroke-width="2.4" opacity="0.7"/>

  <!-- Mattress centre fold line -->
  <line x1="240" y1="140" x2="240" y2="170" opacity="0.3"/>

  <!-- Bedside wardrobes / drawers -->
  <rect x="74" y="70" width="40" height="90" rx="4" stroke-width="2.6" opacity="0.7"/>
  <line x1="74" y1="115" x2="114" y2="115" opacity="0.35"/>
  <rect x="366" y="70" width="40" height="90" rx="4" stroke-width="2.6" opacity="0.7"/>
  <line x1="366" y1="115" x2="406" y2="115" opacity="0.35"/>

  <!-- Reading-light dots -->
  <circle cx="152" cy="56" r="3" opacity="0.55"/>
  <circle cx="328" cy="56" r="3" opacity="0.55"/>
</svg>
