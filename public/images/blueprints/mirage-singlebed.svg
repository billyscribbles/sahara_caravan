<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 200" fill="none" stroke="#FFFFFF" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
  <!-- Schematic corner ticks -->
  <g opacity="0.35" stroke-width="1.6">
    <path d="M24 24 L40 24 M24 24 L24 40"/>
    <path d="M456 24 L440 24 M456 24 L456 40"/>
    <path d="M24 176 L40 176 M24 176 L24 160"/>
    <path d="M456 176 L440 176 M456 176 L456 160"/>
  </g>

  <!-- Overhead skylight spanning the two beds at the head end -->
  <rect x="190" y="16" width="100" height="12" rx="3" stroke-width="2.2" opacity="0.45"/>

  <!-- Left single bed (long axis runs vertically) -->
  <rect x="116" y="34" width="96" height="146" rx="10" stroke-width="2.8"/>
  <!-- Pillow at head (top) -->
  <rect x="128" y="44" width="72" height="28" rx="5" stroke-width="2.4" opacity="0.7"/>
  <!-- Mid-mattress stitch -->
  <line x1="128" y1="110" x2="200" y2="110" opacity="0.35"/>

  <!-- Central cabinet column between the beds -->
  <rect x="222" y="34" width="36" height="146" rx="3" stroke-width="2.6" opacity="0.7"/>
  <line x1="222" y1="74" x2="258" y2="74" opacity="0.35"/>
  <line x1="222" y1="118" x2="258" y2="118" opacity="0.35"/>
  <line x1="222" y1="152" x2="258" y2="152" opacity="0.35"/>

  <!-- Right single bed (mirror) -->
  <rect x="268" y="34" width="96" height="146" rx="10" stroke-width="2.8"/>
  <rect x="280" y="44" width="72" height="28" rx="5" stroke-width="2.4" opacity="0.7"/>
  <line x1="280" y1="110" x2="352" y2="110" opacity="0.35"/>

  <!-- Bedhead reading lights -->
  <circle cx="128" cy="34" r="3" opacity="0.55"/>
  <circle cx="352" cy="34" r="3" opacity="0.55"/>
</svg>
