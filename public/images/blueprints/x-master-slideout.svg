<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 200" fill="none" stroke="#FFFFFF" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
  <!-- Ground line -->
  <line x1="30" y1="186" x2="450" y2="186" stroke-dasharray="2 6" opacity="0.4"/>

  <!-- Slide-out extension box (schematic — the side-wall section that pushes outward at camp) -->
  <rect x="155" y="18" width="175" height="36" rx="3"/>

  <!-- Window inside the slide-out -->
  <rect x="170" y="25" width="145" height="22" rx="2" stroke-width="2"/>

  <!-- Slide-out guide rails (dashed, where the wall emerges from the body) -->
  <line x1="155" y1="54" x2="155" y2="66" stroke-dasharray="3 3" opacity="0.6" stroke-width="1.6"/>
  <line x1="330" y1="54" x2="330" y2="66" stroke-dasharray="3 3" opacity="0.6" stroke-width="1.6"/>

  <!-- Expansion-direction arrow -->
  <g opacity="0.7" stroke-width="1.8">
    <path d="M342 36 L365 36"/>
    <path d="M360 30 L366 36 L360 42"/>
  </g>

  <!-- Body silhouette (same as Standard); chassis line is broken around the tandem wheels -->
  <path d="M65 148 L65 110 L95 88 L95 66 L118 54 L410 54 L410 148 L256 148 M156 148 L65 148"/>

  <!-- Separation line between the stone-guard face and the main body wall -->
  <line x1="95" y1="88" x2="95" y2="148" opacity="0.55" stroke-width="1.8"/>

  <!-- Awning rail along the roof -->
  <line x1="125" y1="66" x2="410" y2="66" opacity="0.45" stroke-width="1.6"/>

  <!-- Front window (narrower — the slide-out occupies the middle of the wall) -->
  <rect x="125" y="78" width="30" height="34" rx="3" stroke-width="2"/>

  <!-- Bedroom window -->
  <rect x="344" y="78" width="60" height="30" rx="3" stroke-width="2"/>

  <!-- Entry door (rear) -->
  <rect x="310" y="112" width="32" height="36" rx="2" stroke-width="2"/>
  <circle cx="334" cy="132" r="1.8" fill="#FFFFFF" stroke="none"/>

  <!-- Fold-down entry step -->
  <line x1="310" y1="152" x2="342" y2="152" opacity="0.55" stroke-width="1.8"/>

  <!-- Checker-plate / body divider -->
  <line x1="65" y1="124" x2="410" y2="124" opacity="0.6" stroke-width="2"/>

  <!-- Storage hatches in the checker-plate band -->
  <rect x="115" y="130" width="42" height="14" rx="2" stroke-width="1.6" opacity="0.65"/>
  <rect x="348" y="130" width="42" height="14" rx="2" stroke-width="1.6" opacity="0.65"/>

  <!-- Tandem off-road wheels -->
  <circle cx="180" cy="162" r="22"/>
  <circle cx="180" cy="162" r="8" stroke-width="1.8"/>
  <circle cx="232" cy="162" r="22"/>
  <circle cx="232" cy="162" r="8" stroke-width="1.8"/>

  <!-- A-frame drawbar + DO35 hitch ball -->
  <path d="M65 148 L15 176"/>
  <path d="M65 110 L15 176" opacity="0.55" stroke-width="2"/>
  <circle cx="15" cy="176" r="4" stroke-width="1.8"/>

  <!-- Twin gas-bottle mount on the drawbar -->
  <rect x="28" y="150" width="18" height="24" rx="2" stroke-width="1.8"/>
  <line x1="37" y1="154" x2="37" y2="172" opacity="0.5" stroke-width="1.4"/>
</svg>
