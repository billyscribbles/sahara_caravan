  <!-- Badge -->
  <text x="240" y="175" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600" letter-spacing="0.15em" fill="#FFFFFF" stroke="none" text-anchor="middle">X-MASTER 226 · SLIDE-OUT</text>
